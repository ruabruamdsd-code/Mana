<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Dashboard - Firebase Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 300px;
            --primary: #4361ee;
            --bg-main: #f8f9fc;
            --white: #ffffff;
            --danger: #ef4444;
            --dark-blue: #2e3b4e;
            --edit-color: #f59e0b;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: var(--bg-main); 
            margin: 0; display: flex; min-height: 100vh;
        }

        /* Sidebar & Navigation */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--white);
            border-right: 1px solid #e3e6f0;
            padding: 30px 20px;
            position: fixed; height: 100vh; overflow-y: auto;
            z-index: 100;
        }

        .admin-section { margin-bottom: 25px; }
        .admin-section h3 { font-size: 13px; color: #858796; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 4px; font-weight: 600; }
        input, select {
            width: 100%; padding: 10px; border: 1px solid #d1d3e2; border-radius: 8px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #324bbd; }

        /* Main Content Area */
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px; }

        #alert-summary {
            display: none; background: #fff1f2; border-left: 5px solid var(--danger);
            padding: 15px; border-radius: 10px; margin-bottom: 30px; color: var(--danger); font-weight: 600;
        }

        /* Shelf Layout */
        .shelf-block { margin-bottom: 40px; }
        .shelf-header { 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #e3e6f0; margin-bottom: 20px; padding-bottom: 10px; 
        }

        .shelf-title { 
            font-size: 18px; font-weight: bold; color: var(--dark-blue); 
            cursor: pointer; padding: 4px 10px; border-radius: 6px; transition: 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .shelf-title:hover { background: #eef2ff; color: var(--primary); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* Item Card Style */
        .card {
            background: var(--white); border-radius: 15px; padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07); position: relative; border-top: 4px solid var(--primary);
            transition: 0.2s;
        }
        .card.low-stock-alert { border-top-color: var(--danger); background: #fffafb; }
        
        .alert-badge {
            background: var(--danger); color: white; font-size: 10px; padding: 2px 8px;
            border-radius: 10px; position: absolute; top: 15px; right: 15px;
        }

        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .item-name-text { font-weight: bold; font-size: 16px; color: var(--dark-blue); max-width: 80%; }
        
        .btn-edit-name { 
            background: none; border: none; cursor: pointer; color: var(--edit-color); font-size: 14px; padding: 0;
            opacity: 0.6; transition: 0.2s;
        }
        .btn-edit-name:hover { opacity: 1; transform: scale(1.1); }

        .qty-input-container {
            margin-top: 15px; background: #f8f9fc; padding: 12px; border-radius: 10px;
            display: flex; align-items: center; justify-content: space-between;
        }
        
        .direct-qty-input {
            width: 80px; padding: 6px; border: 2px solid #d1d3e2; border-radius: 8px;
            font-size: 18px; font-weight: 700; text-align: center; color: var(--primary);
        }
        .input-low { border-color: var(--danger) !important; color: var(--danger) !important; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .footer-actions { margin-top: 15px; display: flex; gap: 10px; border-top: 1px solid #f1f5f9; padding-top: 10px; }
        .btn-sm { border: none; background: none; font-size: 12px; cursor: pointer; color: #858796; text-decoration: underline; }
        .btn-sm-danger:hover { color: var(--danger); }

        @media (max-width: 992px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; padding: 20px; }
            body { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color:var(--primary)">📦 Inventory System</h2>
        
        <div class="admin-section">
            <h3>+ เพิ่มชั้นวาง</h3>
            <input type="text" id="new-shelf-name" placeholder="ชื่อชั้นวางใหม่...">
            <button class="btn btn-primary" style="margin-top:8px" id="btn-add-shelf">สร้างชั้นวาง</button>
        </div>

        <div class="admin-section">
            <h3>+ เพิ่มรายการพัสดุ</h3>
            <div class="input-group">
                <label>ชั้นวาง</label>
                <select id="select-shelf"></select>
            </div>
            <div class="input-group">
                <label>ชื่อพัสดุ/อะไหล่</label>
                <input type="text" id="item-name">
            </div>
            <div class="input-group">
                <label>จำนวน</label>
                <input type="number" id="item-qty" value="0">
            </div>
            <div class="input-group">
                <label>จุดแจ้งเตือน (เหลือน้อยกว่า)</label>
                <input type="number" id="item-threshold" value="100">
            </div>
            <div class="input-group">
                <label>หน่วย</label>
                <input type="text" id="item-unit" placeholder="ตัว, แผ่น, ลิตร...">
            </div>
            <button class="btn btn-primary" id="btn-add-item">บันทึกพัสดุ</button>
        </div>
    </div>

    <div class="main-content">
        <div id="alert-summary"></div>
        <div class="header-top">
            <h1>จัดการสต็อกวัสดุอุปกรณ์ (Firebase)</h1>
            <p id="time-status" style="color:#858796; margin: 5px 0;"></p>
            <div style="display: flex; gap: 15px; font-size: 12px; margin-top: 10px;">
                <span style="color: var(--primary)">● คลิกชื่อชั้นวางเพื่อแก้ไขหัวข้อ</span>
                <span style="color: var(--edit-color)">● คลิก ✎ เพื่อแก้ไขชื่อพัสดุ</span>
            </div>
        </div>

        <div id="inventory-root"></div>
    </div>

<!-- เรียกใช้งาน Firebase SDK Modules -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // ⚠️ นำค่า Config ที่ได้มาจากขั้นตอนใน Firebase Console มาวางแทนที่ตรงนี้ครับ
    const firebaseConfig = {
  apiKey: "AIzaSyBkLNYOMDAvdreU4m5VDG3zk0spL-YSPlk",
  authDomain: "sithikorn-2112.firebaseapp.com",
  databaseURL: "https://sithikorn-2112-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "sithikorn-2112",
  storageBucket: "sithikorn-2112.firebasestorage.app",
  messagingSenderId: "208413841145",
  appId: "1:208413841145:web:1fbca916e0275b580c7428",
  measurementId: "G-2XY4KMV64T"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const dbRef = ref(database, 'inventory');

    let db = {};

    const defaultData = {
        "ชั้น A: อะไหล่หม้อแปลง": [
            { name: "ซีลยางฝาถัง", qty: 120, unit: "แผ่น", threshold: 100 },
            { name: "น็อตตัวเมีย M12", qty: 45, unit: "ตัว", threshold: 100 }
        ],
        "ชั้น B: ปลื้มเอง": [
            { name: "ซีลยางฝาถัง", qty: 120, unit: "แผ่น", threshold: 100 },
            { name: "น็อตตัวเมีย M12", qty: 45, unit: "ตัว", threshold: 100 }
        ],
    };

    // ฟังก์ชันสั่งอัปเดตข้อมูลขึ้น Firebase
    function saveToFirebase(newData) {
        set(dbRef, newData);
    }

    // ฟังการเปลี่ยนแปลงข้อมูลแบบ Realtime จาก Firebase
    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            db = data;
        } else {
            // หากใน Firebase ยังไม่มีข้อมูลเลย (เปิดฐานข้อมูลครั้งแรก) ให้ใส่ค่าเริ่มต้น
            db = defaultData;
            saveToFirebase(db);
        }
        render();
    });

    function render() {
        const root = document.getElementById('inventory-root');
        const select = document.getElementById('select-shelf');
        const currentSelectedShelf = select.value;

        root.innerHTML = ''; select.innerHTML = '';

        Object.keys(db).forEach(shelfName => {
            let opt = document.createElement('option');
            opt.value = shelfName; opt.textContent = shelfName;
            select.appendChild(opt);

            const section = document.createElement('div');
            section.className = 'shelf-block';
            
            let itemsHtml = '';
            // ตรวจสอบว่ามีข้อมูลพัสดุในชั้นวางหรือไม่ (รองรับอาเรย์เปล่า)
            const items = db[shelfName] || [];
            
            items.forEach((item, idx) => {
                const isLow = item.qty < item.threshold;

                itemsHtml += `
                <div class="card ${isLow ? 'low-stock-alert' : ''}" id="card-${shelfName}-${idx}">
                    ${isLow ? `<span class="alert-badge">⚠️ สินค้าใกล้หมด</span>` : ''}
                    
                    <div class="item-header">
                        <span class="item-name-text">${item.name}</span>
                        <button class="btn-edit-name" data-shelf="${shelfName}" data-idx="${idx}" title="แก้ไขชื่อพัสดุ">✎</button>
                    </div>
                    
                    <span style="font-size:12px; color:#858796">แจ้งเตือนที่: < ${item.threshold} ${item.unit}</span>
                    
                    <div class="qty-input-container">
                        <span style="font-size:13px; font-weight:600">คงเหลือ:</span>
                        <div>
                            <input type="number" 
                                   class="direct-qty-input ${isLow ? 'input-low' : ''}" 
                                   value="${item.qty}" 
                                   data-shelf="${shelfName}" data-idx="${idx}"
                            >
                            <span style="font-weight:600; font-size:14px; margin-left:5px">${item.unit}</span>
                        </div>
                    </div>
                    
                    <div class="footer-actions">
                        <button class="btn-sm btn-sm-danger btn-delete-item" data-shelf="${shelfName}" data-idx="${idx}">ลบรายการ</button>
                    </div>
                </div>`;
            });

            section.innerHTML = `
                <div class="shelf-header">
                    <div class="shelf-title" data-shelf="${shelfName}">
                        ${shelfName}
                    </div>
                    ${items.length === 0 ? `<button class="btn-sm btn-delete-shelf" style="color:var(--danger)" data-shelf="${shelfName}">ลบชั้นวางนี้</button>` : ''}
                </div>
                <div class="grid">${itemsHtml || '<p style="color:#858796; padding-left:10px;">ไม่มีพัสดุในชั้นนี้</p>'}</div>
            `;
            root.appendChild(section);
        });

        if (currentSelectedShelf && db[currentSelectedShelf]) {
            select.value = currentSelectedShelf;
        }

        updateAlertSummaryOnly();
        document.getElementById('time-status').innerText = "ข้อมูลอัปเดตเรียลไทม์ล่าสุด: " + new Date().toLocaleString('th-TH');
        
        // ผูก Event Listeners หลังจากการเรนเดอร์เนื้อหา HTML
        bindDynamicEvents();
    }

    function updateAlertSummaryOnly() {
        const alertSum = document.getElementById('alert-summary');
        let lowStockItems = [];

        Object.keys(db).forEach(shelfName => {
            const items = db[shelfName] || [];
            items.forEach(item => {
                if(item.qty < item.threshold) {
                    lowStockItems.push(`${item.name} (${shelfName})`);
                }
            });
        });

        if(lowStockItems.length > 0) {
            alertSum.style.display = 'block';
            alertSum.innerHTML = `⚠️ พบรายการต้องสั่งซื้อเพิ่ม: ${lowStockItems.join(', ')}`;
        } else {
            alertSum.style.display = 'none';
        }
    }

    // จัดการ Event เพื่อไม่ให้หลุดโฟกัสตอนพิมพ์ตัวเลขและรองรับการทำงานในโมดูลของ Firebase
    function bindDynamicEvents() {
        // แก้ไขจำนวนพัสดุ
        document.querySelectorAll('.direct-qty-input').forEach(input => {
            input.addEventListener('input', (e) => {
                const shelf = e.target.dataset.shelf;
                const idx = parseInt(e.target.dataset.idx);
                const val = parseInt(e.target.value);
                const currentQty = isNaN(val) ? 0 : val;

                db[shelf][idx].qty = currentQty;
                saveToFirebase(db); // ยิงเซฟขึ้นคลาวด์ตรงๆ ข้อมูลหน้าจอคนอื่นจะอัปเดตตามอัตโนมัติ
            });
        });

        // แก้ไขชื่อพัสดุ
        document.querySelectorAll('.btn-edit-name').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const shelf = btn.dataset.shelf;
                const idx = parseInt(btn.dataset.idx);
                const oldName = db[shelf][idx].name;
                const newName = prompt("แก้ไขชื่อพัสดุ:", oldName);
                if (newName && newName.trim() !== "" && newName.trim() !== oldName) {
                    db[shelf][idx].name = newName.trim();
                    saveToFirebase(db);
                }
            });
        });

        // แก้ไขชื่อชั้นวาง
        document.querySelectorAll('.shelf-title').forEach(title => {
            title.addEventListener('click', (e) => {
                const oldName = title.dataset.shelf;
                const newName = prompt("แก้ไขชื่อชั้นวาง / หัวข้อ:", oldName);
                if (!newName || newName.trim() === "" || newName.trim() === oldName) return;

                const cleanName = newName.trim();
                if (db[cleanName]) { alert("ชื่อชั้นวางนี้มีอยู่แล้ว"); return; }
                
                db[cleanName] = db[oldName];
                delete db[oldName];
                saveToFirebase(db);
            });
        });

        // ลบรายการพัสดุ
        document.querySelectorAll('.btn-delete-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const shelf = btn.dataset.shelf;
                const idx = parseInt(btn.dataset.idx);
                if(confirm('ยืนยันลบรายการนี้?')) { 
                    db[shelf].splice(idx, 1); 
                    saveToFirebase(db);
                }
            });
        });

        // ลบชั้นวางพัสดุ
        document.querySelectorAll('.btn-delete-shelf').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const shelf = btn.dataset.shelf;
                if(confirm(`ลบชั้นวาง "${shelf}"?`)) { 
                    delete db[shelf]; 
                    saveToFirebase(db);
                } 
            });
        });
    }

    // ฟังก์ชันกลุ่มแผงควบคุมฝั่งซ้าย (Sidebar Static Actions)
    document.getElementById('btn-add-shelf').addEventListener('click', () => {
        const name = document.getElementById('new-shelf-name').value.trim();
        if(name && !db[name]) { 
            db[name] = []; 
            document.getElementById('new-shelf-name').value = '';
            saveToFirebase(db);
        } else if (db[name]) {
            alert("มีชื่อชั้นวางนี้อยู่แล้ว");
        }
    });

    document.getElementById('btn-add-item').addEventListener('click', () => {
        const shelf = document.getElementById('select-shelf').value;
        const name = document.getElementById('item-name').value.trim();
        const qty = parseInt(document.getElementById('item-qty').value) || 0;
        const threshold = parseInt(document.getElementById('item-threshold').value) || 100;
        const unit = document.getElementById('item-unit').value.trim() || 'หน่วย';

        if(shelf && name) {
            if(!db[shelf]) db[shelf] = [];
            db[shelf].push({ name, qty, unit, threshold });
            
            document.getElementById('item-name').value = '';
            document.getElementById('item-qty').value = '0';
            document.getElementById('item-unit').value = '';
            saveToFirebase(db);
        }
    });
</script>
</body>
</html>
