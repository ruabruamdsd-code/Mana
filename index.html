<script type="module">
    // =========================
    // Firebase Config
    // =========================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
        getFirestore,
        doc,
        setDoc,
        getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYA2Bs8k4amhQaOkIhC8_a9rXCtDv46SQ",
        authDomain: "sola-web-e17e2.firebaseapp.com",
        projectId: "sola-web-e17e2",
        storageBucket: "sola-web-e17e2.firebasestorage.app",
        messagingSenderId: "925097721244",
        appId: "1:925097721244:web:d0b9b60fa8da8c0368dc59",
        measurementId: "G-4HWJRNK3JM"
    };

    const app = initializeApp(firebaseConfig);
    const firestore = getFirestore(app);

    // =========================
    // ข้อมูลเริ่มต้น
    // =========================
    const defaultData = {
        "ชั้น A: อะไหล่หม้อแปลง": [
            { name: "ซีลยางฝาถัง", qty: 120, unit: "แผ่น", threshold: 100 },
            { name: "น็อตตัวเมีย M12", qty: 45, unit: "ตัว", threshold: 100 }
        ]
    };

    let db = {};

    // =========================
    // โหลดข้อมูลจาก Firestore
    // =========================
    async function loadData() {
        const docRef = doc(firestore, "inventory", "mainData");
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            db = docSnap.data().items;
        } else {
            db = defaultData;
            await saveToCloud();
        }

        render();
    }

    // =========================
    // บันทึกข้อมูลออนไลน์
    // =========================
    async function saveToCloud() {
        await setDoc(doc(firestore, "inventory", "mainData"), {
            items: db,
            updatedAt: new Date().toISOString()
        });

        console.log("บันทึกข้อมูลออนไลน์แล้ว");
    }

    function render() {
        const root = document.getElementById('inventory-root');
        const select = document.getElementById('select-shelf');
        const alertSum = document.getElementById('alert-summary');

        const currentSelectedShelf = select.value;

        root.innerHTML = '';
        select.innerHTML = '';

        let lowStockItems = [];

        Object.keys(db).forEach(shelfName => {

            let opt = document.createElement('option');
            opt.value = shelfName;
            opt.textContent = shelfName;
            select.appendChild(opt);

            const section = document.createElement('div');
            section.className = 'shelf-block';

            let itemsHtml = '';

            db[shelfName].forEach((item, idx) => {

                const isLow = item.qty < item.threshold;

                if (isLow) {
                    lowStockItems.push(`${item.name} (${shelfName})`);
                }

                itemsHtml += `
                <div class="card ${isLow ? 'low-stock-alert' : ''}">
                    ${isLow ? `<span class="alert-badge">⚠️ สินค้าใกล้หมด</span>` : ''}

                    <div class="item-header">
                        <span class="item-name-text">${item.name}</span>

                        <button class="btn-edit-name"
                            onclick="editItemName('${shelfName}', ${idx})">
                            ✎
                        </button>
                    </div>

                    <span style="font-size:12px; color:#858796">
                        แจ้งเตือนที่: < ${item.threshold} ${item.unit}
                    </span>

                    <div class="qty-input-container">
                        <span style="font-size:13px; font-weight:600">
                            คงเหลือ:
                        </span>

                        <div>
                            <input
                                type="number"
                                class="direct-qty-input ${isLow ? 'input-low' : ''}"
                                value="${item.qty}"
                                onchange="updateQtyManual('${shelfName}', ${idx}, this.value)"
                            >

                            <span style="font-weight:600; font-size:14px; margin-left:5px">
                                ${item.unit}
                            </span>
                        </div>
                    </div>

                    <div class="footer-actions">
                        <button class="btn-sm btn-sm-danger"
                            onclick="deleteItem('${shelfName}', ${idx})">
                            ลบรายการ
                        </button>
                    </div>
                </div>`;
            });

            section.innerHTML = `
                <div class="shelf-header">
                    <div class="shelf-title"
                        onclick="editShelfTitle('${shelfName}')">
                        ${shelfName}
                    </div>

                    ${db[shelfName].length === 0
                        ? `<button class="btn-sm"
                            style="color:red"
                            onclick="deleteShelf('${shelfName}')">
                            ลบชั้นวางนี้
                        </button>`
                        : ''
                    }
                </div>

                <div class="grid">
                    ${itemsHtml || '<p>ไม่มีพัสดุในชั้นนี้</p>'}
                </div>
            `;

            root.appendChild(section);
        });

        if (currentSelectedShelf && db[currentSelectedShelf]) {
            select.value = currentSelectedShelf;
        }

        if (lowStockItems.length > 0) {
            alertSum.style.display = 'block';
            alertSum.innerHTML =
                `⚠️ พบรายการต้องสั่งซื้อเพิ่ม: ${lowStockItems.join(', ')}`;
        } else {
            alertSum.style.display = 'none';
        }

        document.getElementById('time-status').innerText =
            "ข้อมูลอัปเดตเมื่อ: " +
            new Date().toLocaleString('th-TH');
    }

    // =========================
    // แก้ไขชื่อสินค้า
    // =========================
    window.editItemName = async function(shelf, index) {

        const oldName = db[shelf][index].name;

        const newName = prompt("แก้ไขชื่อพัสดุ:", oldName);

        if (newName && newName.trim() !== "") {

            db[shelf][index].name = newName.trim();

            await saveToCloud();

            render();
        }
    }

    // =========================
    // แก้ไขชื่อชั้นวาง
    // =========================
    window.editShelfTitle = async function(oldName) {

        const newName = prompt("แก้ไขชื่อชั้นวาง:", oldName);

        if (newName && newName.trim() !== "") {

            db[newName] = db[oldName];

            delete db[oldName];

            await saveToCloud();

            render();
        }
    }

    // =========================
    // อัปเดตจำนวน
    // =========================
    window.updateQtyManual = async function(shelf, index, value) {

        db[shelf][index].qty = parseInt(value) || 0;

        await saveToCloud();

        render();
    }

    // =========================
    // เพิ่มชั้นวาง
    // =========================
    window.addShelf = async function() {

        const name =
            document.getElementById('new-shelf-name').value.trim();

        if (name && !db[name]) {

            db[name] = [];

            document.getElementById('new-shelf-name').value = '';

            await saveToCloud();

            render();
        }
    }

    // =========================
    // เพิ่มสินค้า
    // =========================
    window.addItem = async function() {

        const shelf =
            document.getElementById('select-shelf').value;

        const name =
            document.getElementById('item-name').value.trim();

        const qty =
            parseInt(document.getElementById('item-qty').value) || 0;

        const threshold =
            parseInt(document.getElementById('item-threshold').value) || 100;

        const unit =
            document.getElementById('item-unit').value || 'หน่วย';

        if (shelf && name) {

            db[shelf].push({
                name,
                qty,
                unit,
                threshold
            });

            await saveToCloud();

            render();
        }
    }

    // =========================
    // ลบสินค้า
    // =========================
    window.deleteItem = async function(shelf, index) {

        if (confirm('ยืนยันลบรายการนี้?')) {

            db[shelf].splice(index, 1);

            await saveToCloud();

            render();
        }
    }

    // =========================
    // ลบชั้นวาง
    // =========================
    window.deleteShelf = async function(name) {

        if (confirm('ลบชั้นวางนี้?')) {

            delete db[name];

            await saveToCloud();

            render();
        }
    }

    // โหลดข้อมูลตอนเปิดเว็บ
    loadData();

</script>
