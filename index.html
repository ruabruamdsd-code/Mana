<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Dashboard - Firebase Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 300px;
            --primary: #4361ee;
            --bg-main: #f8f9fc;
            --white: #ffffff;
            --danger: #ef4444;
            --dark-blue: #2e3b4e;
            --edit-color: #f59e0b;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: var(--bg-main); 
            margin: 0; display: flex; min-height: 100vh;
        }

        /* Sidebar & Navigation */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--white);
            border-right: 1px solid #e3e6f0;
            padding: 30px 20px;
            position: fixed; height: 100vh; overflow-y: auto;
            z-index: 100;
        }

        .admin-section { margin-bottom: 25px; }
        .admin-section h3 { font-size: 13px; color: #858796; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 4px; font-weight: 600; }
        input, select {
            width: 100%; padding: 10px; border: 1px solid #d1d3e2; border-radius: 8px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #324bbd; }

        /* Main Content Area */
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px; }

        #alert-summary {
            display: none; background: #fff1f2; border-left: 5px solid var(--danger);
            padding: 15px; border-radius: 10px; margin-bottom: 30px; color: var(--danger); font-weight: 600;
        }

        /* Shelf Layout */
        .shelf-block { margin-bottom: 40px; }
        .shelf-header { 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #e3e6f0; margin-bottom: 20px; padding-bottom: 10px; 
        }

        .shelf-title { 
            font-size: 18px; font-weight: bold; color: var(--dark-blue); 
            cursor: pointer; padding: 4px 10px; border-radius: 6px; transition: 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .shelf-title:hover { background: #eef2ff; color: var(--primary); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* Item Card Style */
        .card {
            background: var(--white); border-radius: 15px; padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07); position: relative; border-top: 4px solid var(--primary);
            transition: 0.2s;
        }
        .card.low-stock-alert { border-top-color: var(--danger); background: #fffafb; }
        
        .alert-badge {
            background: var(--danger); color: white; font-size: 10px; padding: 2px 8px;
            border-radius: 10px; position: absolute; top: 15px; right: 15px;
        }

        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .item-name-text { font-weight: bold; font-size: 16px; color: var(--dark-blue); max-width: 100%; }
        
        /* ปรับสไตล์ปุ่มแก้ไขให้ใช้ร่วมกันได้ทั้งชื่อและรหัส */
        .btn-edit-name, .btn-edit-code { 
            background: none; border: none; cursor: pointer; color: var(--edit-color); padding: 0;
            opacity: 0.6; transition: 0.2s;
        }
        .btn-edit-name:hover, .btn-edit-code:hover { opacity: 1; transform: scale(1.1); }
        .btn-edit-name { font-size: 14px; }
        .btn-edit-code { font-size: 11px; }
